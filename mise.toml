[env]
PROJECT_NAME = "Crow"
DERIVED_DATA = "{{cwd}}/.derived-data"

[tasks.dev]
description = "Run crowd with the hot-reload dev loop (web served live from source)"
run = "make crowd-dev"

[tasks.build]
description = "Full build: crow + crowd"
run = "make build"

[tasks."build:release"]
description = "Release build"
run = "make build CONFIG=release"

[tasks.test]
description = "Run all package tests"
run = "make test"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf .build .derived-data"

[tasks."xcode:generate"]
description = "Generate Xcode project"
run = "swift package generate-xcodeproj"
