<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crow — Sign in</title>
  <!-- Standalone: the auth gate blocks app.css/app.js until you're in, so this
       page inlines its own styles (CROW-593). -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
           background: #1e1e1e; color: #d4d4d4;
           font: 14px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .card { width: 320px; padding: 28px; background: #252526; border: 1px solid #333;
            border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,.45); }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .brand img { width: 28px; height: 28px; }
    .brand h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .2px; }
    label { display: block; font-size: 12px; color: #9aa0a6; margin-bottom: 6px; }
    input[type=password] { width: 100%; padding: 10px 12px; font-size: 14px; background: #1e1e1e;
            color: #d4d4d4; border: 1px solid #3a3a3a; border-radius: 6px; }
    input:focus { outline: none; border-color: #c8a24a; }
    button { width: 100%; margin-top: 16px; padding: 10px; font-size: 14px; font-weight: 600;
             cursor: pointer; background: #c8a24a; color: #1e1e1e; border: none; border-radius: 6px; }
    button:disabled { opacity: .6; cursor: default; }
    .err { margin-top: 12px; min-height: 16px; font-size: 12px; color: #e06c75; }
  </style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <div class="brand"><img src="/brand.svg" alt=""><h1>Crow</h1></div>
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" autofocus>
    <button type="submit" id="submit">Sign in</button>
    <div class="err" id="err" role="alert"></div>
  </form>
  <script>
    const form = document.getElementById('loginForm');
    const pw = document.getElementById('pw');
    const submit = document.getElementById('submit');
    const err = document.getElementById('err');
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      err.textContent = '';
      submit.disabled = true;
      try {
        const r = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw.value }),
        });
        if (r.ok) { location.href = '/'; return; }
        err.textContent = r.status === 429
          ? 'Too many attempts — wait a minute and try again.'
          : 'Incorrect password.';
      } catch (_) {
        err.textContent = 'Network error — is the daemon reachable?';
      }
      submit.disabled = false;
      pw.select();
    });
  </script>
</body>
</html>
