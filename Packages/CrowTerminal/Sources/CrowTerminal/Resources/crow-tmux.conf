# Crow's bundled tmux configuration.
#
# Loaded via `tmux -f <path-to-this>` when Crow starts the embedded tmux
# server. Crow drives every action via `tmux <subcommand>` from Swift, so
# this config exists primarily to control the visual surface and the
# escape-sequence passthrough path.
#
# DO NOT load this from a user's ~/.tmux.conf — it's app-internal and
# unbinds every default key. A user-level escape hatch would live at
# ~/.config/crow/tmux.conf and be loaded in addition; not enabled by
# default.

# Required for OSC 133 / OSC 9 / inline-image sequences to reach the
# attached xterm.js surface. Without this, raw escape bytes from the shell
# wrapper are consumed by tmux's emulator. Must be set at server start.
set -gs allow-passthrough on

# 256-color profile for the xterm.js renderer.
set -gs default-terminal screen-256color

# Hide the tmux status bar — Crow has its own session/tab UI. Without
# this, tmux steals one cell row from the terminal surface.
set -gs status off

# Mouse OFF. With mouse on, tmux captures the scroll wheel and slams the pane
# into copy-mode (its modal scrollback pager) on every scroll-up — the "scroll
# takeover" that fights the terminal's own scrolling. Off hands scrolling AND
# text selection to the outer terminal — xterm.js on the web surface, the
# native terminal on desktop — which scroll natively and smoothly with no
# copy-mode. Apps that need the mouse (vim, htop, …) still turn on the xterm
# mouse protocol themselves at runtime and work regardless of this default.
#
# History: mouse was on for wheel scrollback (#445/#452), but the copy-mode
# takeover proved worse in daily use. The mouse bindings below are now dormant;
# flipping this back to `on` restores the previous tmux-owned mouse behavior.
set -gs mouse off

# Alternate-screen OFF. Full-screen apps — including Crow's agent TUIs (Claude
# Code, Cursor) — normally switch the terminal to its alternate buffer, which
# has NO scrollback. With `mouse off` above, wheeling in that buffer falls back
# to the emulator's "alternate scroll": it sends arrow keys, which the agent
# reads as input-history navigation instead of scrolling (the reported bug).
# Keeping inner apps in the pane's MAIN buffer means output that scrolls off the
# top lands in xterm.js's 50k-line scrollback, so the wheel scrolls the terminal
# window natively — exactly what mouse-off is meant to deliver.
#
# Trade-off: classic full-screen apps (vim, htop, less) no longer restore the
# pre-launch screen on exit — their final frame stays in scrollback. For a
# session-runner whose main content is the agent transcript, unified scrollback
# is the better default. Flip back to `on` to restore alternate-screen behavior.
#
# Scope: `alternate-screen` is a WINDOW option, so it's set with `-gw` (global
# window default) — the scope-correct idiom for "apply to every new window."
# (`-gs` happened to work in tmux 3.6a via option-table leniency, but `-gw` is
# the documented scope and keeps the #804 `alternate_on` detection meaningful.)
#
# PER-SURFACE HYBRID (ADR-0013, #824): this is the DEFAULT, not the whole
# story. It is the right model for LINE-STREAMING output (shells, git log,
# build logs, review diffs) — text flows down and never repaints, so it lands
# in scrollback and the wheel scrolls it.
#
# It is the WRONG model for a continuously repainting full-frame TUI. Denied a
# fixed viewport, an agent's repaints land in a main buffer that is itself
# scrolling, so every clear-and-redraw deposits the prior frame into the 50k
# history as sediment — scrolling up walked 42 stacked copies of the Claude
# Code TUI (#822, measured: history_size 1641 vs 0 with the alt screen on).
#
# So crowd sets `alternate-screen on` PER WINDOW for agent-TUI surfaces at
# creation (TmuxBackend.registerTerminal → enableAlternateScreen), keyed on the
# terminal's `isManaged`:
#     tmux set-window-option -t <agent-window> alternate-screen on
# Per-window `on` coexists with this global `off` in one server. Do NOT flip
# this default to `on` to "fix" the agent case — that is spike Option A, which
# deletes the unified scrollback for EVERY surface (a plain shell's history
# would go to 0 and CROW-606 replay would have nothing to restore).
#
# Two consequences worth knowing: an agent window in its alt buffer is NOT a
# CROW-804 degraded window (TmuxBackend.isScrollbackDegraded takes
# `alternateScreenEnabled` so healthy agent tabs aren't badged ⚠), and the
# option is frozen per window at creation, so pre-existing windows are
# re-applied on adopt rather than retrofitted by a source-file reload.
set -gw alternate-screen off

# Cancel the CLIENT terminal's alternate-screen capability (smcup/rmcup). On
# attach, tmux switches its client — here xterm.js, which reports as
# TERM=xterm-256color — into that terminal's alternate buffer, which has NO
# scrollback. This is a SEPARATE layer from `alternate-screen off` above (that
# governs only inner apps; every pane here is already `alternate_on=0`), and
# it's why the browser wheel still fell into arrow-key "alternate scroll" that
# navigates the agent's input history. Removing the capability with `@` makes
# tmux render into the client's MAIN buffer instead, where xterm.js's 50k-line
# scrollback applies and the wheel scrolls the window natively. Matches the
# browser client (xterm*) plus the default-terminal family (screen*) for good
# measure. Takes effect on the NEXT attach — reconnect the terminal after
# reloading this conf.
#
# THIS STAYS GLOBAL — it cannot be scoped per surface (#824). `terminal-
# overrides` is a SERVER option matched on the CLIENT's TERM, and one tmux
# client serves every tab (each web surface opens ONE grouped `crowd-web-*`
# session; switching tabs is `select-window` within that single attach). smcup
# is therefore emitted once for the whole attachment, and there is no
# per-window client buffer state to scope. Dropping it would put xterm.js in
# its alternate buffer for ALL tabs, killing the unified scrollback everywhere.
#
# That is why `app.js` must NOT route the hybrid scroll model on
# `term.buffer.active.type === 'alternate'`: with this strip in place the web
# client is permanently in its main buffer, so that test is always false. The
# window kind is signalled out of band instead — crowd emits `agent_surface`
# per terminal on `list-terminals`, read from the `alternate-screen` window
# option it actually set, and app.js routes the wheel and the mouse-mode
# swallow on that. See ADR-0013.
set -gas terminal-overrides ',xterm*:smcup@:rmcup@,screen*:smcup@:rmcup@'

# Crow owns the keyboard namespace: the prefix table must end up empty so
# tmux's default `C-b <key>` shortcuts can't fire in the surface. A bare
# `unbind-key -a` (no `-T`) targets the prefix table, but it fails with
# `table prefix doesn't exist` once the table has been cleared — and that
# failure made `source-file` return exit 1 on every reconcile-on-attach
# pass (#451 path), poisoning #451's gating logic (#473).
#
# Pre-creating the table with a stub `Any` binding guarantees `unbind-key
# -a -T prefix` always has something to clear, so the command stays
# idempotent across fresh startup AND `source-file` reloads. Net result is
# the same empty prefix table as before — without the exit-1.
#
# Do NOT widen this to `unbind-key -a -T root`: tmux's root-table defaults must
# survive for correct behavior; wiping root would break them.
bind-key -T prefix Any send-keys
unbind-key -a -T prefix

# --- Mouse bindings (DORMANT) --------------------------------------------
# `mouse off` above means tmux never receives mouse events, so none of the
# bindings in this section fire — the outer terminal owns selection, copy, and
# scroll. They're retained so flipping `mouse on` restores the tuned behavior
# (#445 selection-clear, #452 copy-on-select, #486 copy-mode auto-exit).

# Default MouseDragEnd1Pane is `send-keys -X copy-pipe-and-cancel`; the
# -and-cancel exits copy mode after copying, which wipes the visual
# selection. -no-clear keeps the selection highlighted AND copies to the
# macOS pasteboard. Bound in both copy-mode tables since either may be
# active depending on the user's `mode-keys` setting.
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# Single click outside the current selection should clear it (macOS Terminal /
# iTerm2 convention). #452 keeps the copy-mode selection alive after mouse-up
# via `copy-pipe-no-clear`; without this binding a follow-up click leaves the
# old highlight stuck. Mirrors the DoubleClick1Pane wrapper below: forward to
# the inner app if it captured mouse, otherwise cancel copy-mode so the
# selection dismisses. MouseDrag1Pane (which initiates a new selection) still
# fires after this and re-enters copy-mode cleanly.
bind -T root MouseDown1Pane select-pane -t = \; if -F -t = "#{mouse_any_flag}" "send-keys -M" { if -F -t = "#{pane_in_mode}" "send-keys -X cancel" }

# Same fix for double-click (select-word) and triple-click (select-line)
# on the root table — the defaults also end in `copy-pipe-and-cancel`
# and would otherwise clear the highlight after copying, inconsistent
# with the drag behavior above. The nested if-shell wrappers match the
# tmux defaults: forward the mouse event to the inner app if it's
# captured mouse (`mouse_any_flag`), or to copy-mode if a pane is
# already in a mode; otherwise enter copy mode, select word/line, and
# copy without clearing.
bind -T root DoubleClick1Pane select-pane -t = \; if -F -t = "#{mouse_any_flag}" "send-keys -M" { if -F -t = "#{pane_in_mode}" "send-keys -M" { copy-mode -H ; send-keys -X select-word ; run -d0.3 ; send-keys -X copy-pipe-no-clear "pbcopy" } }
bind -T root TripleClick1Pane select-pane -t = \; if -F -t = "#{mouse_any_flag}" "send-keys -M" { if -F -t = "#{pane_in_mode}" "send-keys -M" { copy-mode -H ; send-keys -X select-line ; run -d0.3 ; send-keys -X copy-pipe-no-clear "pbcopy" } }

# Pin WheelUpPane to `copy-mode -e` so the pane auto-exits copy-mode once
# wheel-down scrolls back past the bottom of history. Matches tmux ≥3.0
# defaults, but making it explicit insulates Crow from upstream changes
# and pairs with the send-path copy-mode cancel in TmuxBackend.sendText
# (#486) — together they minimize the time a pane sits stuck in copy-mode
# after the user scrolls.
bind -T root WheelUpPane if -F -t = "#{mouse_any_flag}" "send-keys -M" { if -F -t = "#{pane_in_mode}" "send-keys -M" "copy-mode -et=" }

# Default history-limit is 2000 lines per pane. We match the web terminal's
# xterm.js client scrollback (50000) so that on (re)connect the daemon can
# replay the pane's FULL retained history back into the browser buffer
# (`capture-pane -pe -S -N` in TerminalWebSocket / TerminalCockpit, CROW-606)
# with nothing truncated below what the client itself can hold. Phase 3 §2 (the
# spike) measured 5 windows × 10k lines as a 400kB RSS delta; extrapolated,
# 5 fully-populated windows × 50k ≈ low-single-MB, and tmux allocates history
# lazily as it accrues, so idle sessions cost nothing. This is the ceiling on
# how far back the user can scroll after a crowd restart or browser reload.
#
# Caveat (tmux man page): history-limit "applies only to new windows —
# existing window histories are not resized". Reloading this conf / raising
# the server option does NOT lift the per-pane cap on windows created under
# the old 5000 (or 2000) limit; only windows created after the bump inherit
# 50000. Surviving panes keep whatever they were born with until the window
# is recreated.
set -gs history-limit 50000

# Size each window from only the clients for which it is the CURRENT window
# (#667). Every web surface (Tauri desktop, browser, phone) opens a GROUPED
# session off crow-cockpit that shares the window list — so a window's size is
# shared, and tmux's default `window-size latest` hands it to the most recent
# client to touch it, with no notion of focus. With `aggressive-resize off`
# (the default) a background surface parked on a DIFFERENT window still counts
# toward this window's size and can drag it on relayout. `on` scopes size
# negotiation to the clients actually viewing the window, complementing app.js's
# focus-gated resize (only the focused surface sends a resize frame). tmux docs:
# aggressive-resize applies per-window and is honored when window-size is
# `smallest`/`largest`; under `latest` it still narrows which clients a window
# tracks. Takes effect on the next attach / after the conf is re-sourced —
# reconnect the terminal to pick it up on existing windows.
set -gw aggressive-resize on

# No escape-key delay — interactive editors (vi-mode shells, etc.) feel
# sluggish with tmux's default 500ms.
set -gs escape-time 0

# Emit CSI-u / modifyOtherKeys sequences so the inner app can distinguish
# Shift+Enter from Enter (and other modified keys). Required by Claude
# Code to insert a newline on Shift+Enter instead of submitting.
set -gs extended-keys on

# Advertise the `extkeys` capability for the terminal types we actually
# run under. `default-terminal` above is `screen-256color`, so the docs'
# literal `xterm*:extkeys` glob does NOT match on its own — `screen*` is
# the load-bearing entry here. `-gas` appends to the server-level list so
# tmux's built-in terminal-features merges are preserved; the leading
# comma keeps the append safe when the existing value is empty.
set -gas terminal-features ',screen*:extkeys,xterm*:extkeys'
