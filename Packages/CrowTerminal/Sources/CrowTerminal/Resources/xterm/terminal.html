<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="xterm.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e1e;
    }
    #terminal {
      width: 100%;
      height: 100%;
    }
    #crow-jump-bottom {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 34px;
      height: 34px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      color: #ddc482;
      background: #22262a;
      border: 1px solid rgba(221, 196, 130, 0.35);
      border-radius: 17px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      cursor: pointer;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.12s ease;
    }
    #crow-jump-bottom:hover {
      background: #2a2f34;
      border-color: rgba(221, 196, 130, 0.6);
    }
    #crow-jump-bottom.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <button id="crow-jump-bottom" class="hidden" aria-label="Jump to latest output" title="Jump to bottom">&#9662;</button>
  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script src="xterm-addon-image.js"></script>
  <script>
    (function () {
      function reportError(message) {
        console.error('Crow:', message);
        const handlers = window.webkit && window.webkit.messageHandlers;
        if (handlers && handlers.crowError) {
          handlers.crowError.postMessage({ message: message });
        }
      }

      const handlers = window.webkit && window.webkit.messageHandlers;
      if (!handlers) {
        reportError('webkit.messageHandlers missing');
        return;
      }

      if (typeof Terminal !== 'function') {
        reportError('Terminal constructor missing (xterm.js failed to load)');
        return;
      }
      if (typeof FitAddon !== 'object' || typeof FitAddon.FitAddon !== 'function') {
        reportError('FitAddon constructor missing');
        return;
      }
      if (typeof ImageAddon !== 'object' || typeof ImageAddon.ImageAddon !== 'function') {
        reportError('ImageAddon constructor missing');
        return;
      }

      try {
        const fitAddon = new FitAddon.FitAddon();
        const imageAddon = new ImageAddon.ImageAddon({
          sixelSupport: true,
          iipSupport: true,
          kittySupport: true,
        });
        const term = new Terminal({
          cursorBlink: true,
          fontSize: 14,
          // Nerd Font first for Claude/Cursor TUI icons; Menlo fallback if not installed.
          fontFamily: '"MesloLGS NF", "MesloLGS Nerd Font", "JetBrainsMono Nerd Font", "Hack Nerd Font", "FiraCode Nerd Font", Menlo, Monaco, monospace',
          theme: { background: '#1e1e1e', foreground: '#d4d4d4' },
          scrollback: 10000,
          allowTransparency: true,
        });
        term.loadAddon(fitAddon);
        term.loadAddon(imageAddon);
        term.open(document.getElementById('terminal'));

        // xterm's hidden textarea triggers WebKit Autofill/Services menus — block only there.
        if (term.textarea) {
          term.textarea.setAttribute('autocomplete', 'off');
          term.textarea.setAttribute('autocorrect', 'off');
          term.textarea.setAttribute('autocapitalize', 'off');
          term.textarea.setAttribute('spellcheck', 'false');
          term.textarea.addEventListener('contextmenu', function (event) {
            event.preventDefault();
          }, true);
        }


        // Jump-to-bottom control (#633). Long agent/chat output leaves no fast
        // path back to the live edge once you scroll up; show a pill when the
        // viewport is above the bottom and snap back on click. onScroll is the
        // primary trigger (leaving the bottom only ever happens via a user
        // scroll — new output while pinned auto-scrolls and stays pinned);
        // onRender is a safety-net re-check.
        const jumpBtn = document.getElementById('crow-jump-bottom');
        function atBottom() {
          const b = term.buffer.active;
          return b.viewportY >= b.baseY;
        }
        function updateJumpButton() {
          if (jumpBtn) {
            jumpBtn.classList.toggle('hidden', atBottom());
          }
        }
        if (jumpBtn) {
          jumpBtn.addEventListener('click', function () {
            term.scrollToBottom();
            term.focus(); // restore typing focus stolen by the button
            updateJumpButton();
          });
        }
        term.onScroll(updateJumpButton);
        term.onRender(updateJumpButton);

        // Resize path (#637): the agent TUI clobbers when it's SIGWINCH'd
        // faster than it can redraw, so coalesce bursts and drop no-op resizes.
        //  - applyFit() fits, then posts crowResize ONLY when cols/rows actually
        //    changed since the last post. Same-size cycles → zero SIGWINCH.
        //    (fitAddon.fit() already no-ops xterm's own resize when unchanged;
        //    the postMessage is what storms the PTY, so we gate that here.)
        //  - scheduleFit() collapses a drag's rapid resize events to one fit per
        //    animation frame. Both Swift (window.crowFit) and the DOM resize
        //    listener route through it.
        let lastCols = 0;
        let lastRows = 0;
        let fitPending = false;

        function applyFit() {
          fitAddon.fit();
          if (term.cols !== lastCols || term.rows !== lastRows) {
            lastCols = term.cols;
            lastRows = term.rows;
            handlers.crowResize.postMessage({ cols: term.cols, rows: term.rows });
          }
        }

        function scheduleFit() {
          if (fitPending) {
            return;
          }
          fitPending = true;
          requestAnimationFrame(function () {
            fitPending = false;
            applyFit();
          });
        }

        window.crowWrite = function (b64) {
          const bin = atob(b64);
          const bytes = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) {
            bytes[i] = bin.charCodeAt(i);
          }
          // Pass raw bytes so UTF-8 multibyte sequences (Claude/Cursor TUIs) stay intact.
          term.write(bytes);
        };

        window.crowFit = scheduleFit;

        // xterm.js emits the same bare \r for Enter and Shift+Enter, so
        // Claude Code can't tell them apart and submits on both (#598).
        // Intercept modified Enter and send a distinct sequence through the
        // same crowInput bridge:
        //  - Shift+Enter → CSI-u \x1b[13;2u. crow-tmux.conf's extended-keys
        //    setup carries it to apps that negotiate extended keys (Claude
        //    Code → insert newline) and downgrades it to plain \r for apps
        //    that don't, so nothing leaks into vim/shells.
        //  - Option+Enter → \x1b\r (ESC CR), Claude Code's other native
        //    insert-newline chord. macOptionIsMeta stays off so Option-key
        //    composed characters keep working for regular typing.
        // Returning false suppresses xterm.js's default \r for every event
        // phase (keydown/keypress/keyup) of the combo.
        term.attachCustomKeyEventHandler(function (e) {
          if (e.key !== 'Enter' || e.ctrlKey || e.metaKey) {
            return true;
          }
          if (e.shiftKey && !e.altKey) {
            if (e.type === 'keydown') {
              handlers.crowInput.postMessage({ data: '\x1b[13;2u' });
            }
            return false;
          }
          if (e.altKey && !e.shiftKey) {
            if (e.type === 'keydown') {
              handlers.crowInput.postMessage({ data: '\x1b\r' });
            }
            return false;
          }
          return true;
        });

        term.onData(function (data) {
          handlers.crowInput.postMessage({ data: data });
        });

        window.addEventListener('resize', scheduleFit);
        handlers.crowReady.postMessage({});
        // Synchronous first fit so the PTY gets a correct initial winsize.
        applyFit();
        // The first fit can run with the Menlo fallback before "MesloLGS NF"
        // loads; once the Nerd Font's cell metrics settle the grid recomputes,
        // so re-fit and post the (deduped) corrective size. (#637 repro hint 2)
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(scheduleFit);
        }
        updateJumpButton();
      } catch (err) {
        reportError(String(err));
      }
    })();
  </script>
</body>
</html>
