name: CI

on:
  pull_request:
    # Base-branch filter: stacked feature PRs (e.g. onto crow-593) need CI too.
    branches: [main, 'feature/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Generate build info
        run: bash scripts/generate-build-info.sh

      - name: Build
        run: swift build

      - name: Run tests
        run: |
          for pkg in Packages/*/; do
            if [ -d "$pkg/Tests" ]; then
              echo "==> Testing $(basename "$pkg")..."
              swift test --package-path "$pkg"
            fi
          done

  desktop:
    name: Desktop (Tauri) Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build crow-desktop (Rust/Tauri)
        run: cargo build --manifest-path crow-desktop/src-tauri/Cargo.toml

  shellcheck:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scripts
        run: shellcheck scripts/*.sh
