name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Run tests
        run: |
          bash scripts/generate-build-info.sh
          for pkg in Packages/*/; do
            if [ -d "$pkg/Tests" ]; then
              echo "==> Testing $(basename "$pkg")..."
              swift test --package-path "$pkg"
            fi
          done

  shellcheck:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scripts
        run: shellcheck scripts/*.sh

  release:
    name: Build, Sign & Release
    needs: [test, shellcheck]
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Extract version from tag
        run: echo "CROW_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          rm -f "$CERTIFICATE_PATH"

      - name: Bundle Crow.app
        env:
          CROW_VERSION: ${{ env.CROW_VERSION }}
        run: |
          bash scripts/generate-build-info.sh
          bash scripts/bundle.sh

      - name: Sign, create DMG, and notarize
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          CROW_VERSION: ${{ env.CROW_VERSION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/sign-and-notarize.sh

      - name: Build CLI
        run: |
          swift build -c release --arch arm64 --arch x86_64 --product crow
          if [ -f .build/apple/Products/Release/crow ]; then
            cp .build/apple/Products/Release/crow crow-cli-macos-universal
          else
            cp .build/release/crow crow-cli-macos-universal
          fi
          lipo -info crow-cli-macos-universal

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Crow-${{ env.CROW_VERSION }}.dmg
            crow-cli-macos-universal
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
